<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <main class="container glass-panel">
        <header>
            <h1>Admin <span>Dashboard</span></h1>
            <p class="subtitle">Manage Users</p>
            <button id="logout-btn" class="btn" style="width: auto; margin: 10px auto; padding: 10px 20px; background: var(--danger-color)">Logout <i class="fas fa-sign-out-alt"></i></button>
        </header>

        <section class="main-content" style="grid-template-columns: 1fr;">
            
            <div class="dashboard-cards" style="margin-bottom: 30px;">
                <div class="balance-card" style="background: var(--accent-color);">
                    <h4>Total Users</h4>
                    <h1 id="stat-users">0</h1>
                </div>
                <div class="balance-card" style="background: var(--primary-color);">
                    <h4>Total Transactions</h4>
                    <h1 id="stat-transactions">0</h1>
                </div>
                <div class="inc-exp-container glass-panel">
                    <div>
                        <h4>System Income</h4>
                        <p id="stat-income" class="money plus">+₹0.00</p>
                    </div>
                    <div class="divider"></div>
                    <div>
                        <h4>System Expense</h4>
                        <p id="stat-expense" class="money minus">-₹0.00</p>
                    </div>
                </div>
            </div>

            <div class="history-container">
                <h3>All Users</h3>
                <ul id="user-list" class="list">
                    <!-- Users will go here -->
                </ul>
            </div>
        </section>
    </main>
    <script src="admin.js"></script>
</body>
</html>
